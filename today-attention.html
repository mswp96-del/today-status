// ---- MCP tool ids ----
const T_CAL   = "mcp__dcbe127e-5d2a-4bec-975a-8288087f89b7__list_events";
const T_MAIL  = "mcp__fed21031-00d7-48c4-8f6b-31538d79cced__search_threads";
const T_FILES = "mcp__a8734672-72fd-46dc-9323-ffa7c8e04d2d__list_recent_files";
const T_SEARCH= "mcp__a8734672-72fd-46dc-9323-ffa7c8e04d2d__search_files";
const T_READ  = "mcp__a8734672-72fd-46dc-9323-ffa7c8e04d2d__read_file_content";

const KST = 'Asia/Seoul';
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function ymd(d){ return new Intl.DateTimeFormat('en-CA',{timeZone:KST,year:'numeric',month:'2-digit',day:'2-digit'}).format(d); }
const NOW = new Date();
const TODAY = ymd(NOW);
document.getElementById('today').textContent = TODAY + ' (' + ['일','월','화','수','목','금','토'][new Date(TODAY+'T00:00:00+09:00').getDay()] + ')';
document.getElementById('stamp').textContent = '마지막 로딩: ' + new Intl.DateTimeFormat('ko-KR',{timeZone:KST,dateStyle:'medium',timeStyle:'short'}).format(NOW);

function ddayNum(dateStr){ // dateStr YYYY-MM-DD
  return Math.round((Date.parse(dateStr+'T00:00:00+09:00') - Date.parse(TODAY+'T00:00:00+09:00'))/86400000);
}
function ddayLabel(n){ if(n===0) return 'D-DAY'; return n>0? 'D-'+n : 'D+'+(-n); }
function ddayClass(n){ if(n<0) return 'd-past'; if(n<=7) return 'd-urgent'; if(n<=21) return 'd-soon'; return 'd-ok'; }

async function mcp(name,args){
  try{
    const r = await window.cowork.callMcpTool(name, args||{});
    if(!r) return null;
    if(r.isError) throw new Error('tool error');
    let d = r.structuredContent;
    if(d==null && r.content && r.content[0] && r.content[0].text){ d = JSON.parse(r.content[0].text); }
    return d;
  }catch(e){ console.warn('mcp fail', name, e); return null; }
}

/* ================= 캘린더 ================= */
async function loadCal(){
  const start = TODAY+'T00:00:00+09:00';
  const end   = ymd(new Date(NOW.getTime()+8*86400000))+'T00:00:00+09:00';
  const d = await mcp(T_CAL,{startTime:start,endTime:end,orderBy:'startTime',pageSize:40,timeZone:KST});
  const box = document.getElementById('cal');
  if(!d){ box.innerHTML='<div class="err">캘린더를 불러오지 못했습니다</div>'; document.getElementById('cnt-cal').textContent='!'; return {today:0,week:0}; }
  let evs = (d.events||[]).filter(e=>e.status!=='cancelled');
  // normalize
  evs = evs.map(e=>{
    const allday = !!(e.start&&e.start.date);
    let date, tstr='';
    if(allday){ date = e.start.date.slice(0,10); }
    else{ const dt=e.start.dateTime; date = ymd(new Date(dt)); tstr = new Intl.DateTimeFormat('ko-KR',{timeZone:KST,hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(dt)); }
    return {allday,date,tstr,summary:e.summary||'(제목 없음)'};
  }).filter(e=>e.date>=TODAY).sort((a,b)=> (a.date+ (a.tstr||'00:00')).localeCompare(b.date+(b.tstr||'00:00')));

  let todayCnt=0;
  evs.forEach(e=>{ if(e.date===TODAY) todayCnt++; });
  document.getElementById('cnt-cal').textContent = evs.length;

  if(!evs.length){ box.innerHTML='<div class="empty">이번 주 일정이 없습니다</div>'; return {today:0,week:0}; }
  let html='', curDate='';
  const dow=['일','월','화','수','목','금','토'];
  evs.forEach(e=>{
    if(e.date!==curDate){
      curDate=e.date;
      const isT=e.date===TODAY;
      const dd=new Date(e.date+'T00:00:00+09:00');
      const lbl = (isT?'오늘':'') + ' '+e.date.slice(5).replace('-','/')+' ('+dow[dd.getDay()]+')';
      html+='<div class="datehdr'+(isT?' is-today':'')+'">'+esc(lbl.trim())+'</div>';
    }
    html+='<div class="item"><div class="time'+(e.allday?' allday':'')+'">'+(e.allday?'종일':esc(e.tstr))+'</div><div class="it-main"><div class="it-title">'+esc(e.summary)+'</div></div></div>';
  });
  box.innerHTML=html;
  return {today:todayCnt, week:evs.length};
}

async function loadGongmun(){
  const box=document.getElementById('gm');
  let data=null, live=false;
  try{
    const s = await mcp(T_SEARCH,{query:"title = 'gongmun_data.json'",pageSize:5,excludeContentSnippets:true});
    const files = s && s.files ? s.files.slice().sort((a,b)=>String(b.modifiedTime||'').localeCompare(String(a.modifiedTime||''))) : [];
    if(files.length){
      const r = await mcp(T_READ,{fileId:files[0].id});
      const fc = r && r.fileContent ? r.fileContent : null;
      if(fc){
        const cleaned = fc.replace(/\\(?![\/bfnrtu"\\])/g,'');
        data = JSON.parse(cleaned); live=true;
      }
    }
  }catch(e){ console.warn('gongmun live fail', e); }
  if(!data){ data = GM_FALLBACK; }

  let items = (data.items||[]).filter(x=>x.status!=='마감');
  items = items.map(x=>({...x, dd: x.date? ddayNum(x.date): null}))
               .filter(x=> x.dd===null || x.dd>=0);
  items.sort((a,b)=>{
    if(a.dd===null && b.dd===null) return 0;
    if(a.dd===null) return 1;
    if(b.dd===null) return -1;
    return a.dd-b.dd;
  });
  document.getElementById('cnt-gm').textContent = items.length;
  if(!items.length){ box.innerHTML='<div class="empty">임박한 공문 마감이 없습니다</div>'; return {urgent:0,items:[]}; }

  let html = live?'' : '<div class="srcnote">※ 실시간 파일을 못 읽어 내장 스냅샷을 표시합니다</div>';
  items.forEach(x=>{
    const ddH = x.dd===null? '<span class="dday d-ok">상시</span>' : '<span class="dday '+ddayClass(x.dd)+'">'+ddayLabel(x.dd)+'</span>';
    html+='<div class="item">'+ddH+'<div class="it-main"><div class="it-title"><span class="tag t-'+esc(x.status)+'">'+esc(x.status)+'</span>'+esc(x.task)+'</div><div class="it-sub"><span class="area">'+esc(x.area)+'</span> · '+esc(x.where||'')+(x.note?' · '+esc(x.note):'')+' · '+esc(x.doc||'')+'</div></div></div>';
  });
  box.innerHTML=html;
  const urgent = items.filter(x=>x.dd!==null && x.dd<=7);
  return {urgent:urgent.length, items:urgent};
}

/* ================= 안읽은 메일 ================= */
async function loadMail(){
  const box=document.getElementById('mail');
  let d = await mcp(T_MAIL,{query:'is:unread in:inbox',pageSize:15});
  if(d===null){ box.innerHTML='<div class="err">메일을 불러오지 못했습니다</div>'; document.getElementById('cnt-mail').textContent='!'; return 0; }
  let threads = d.threads||[];
  let unreadCount = threads.length;
  document.getElementById('cnt-mail').textContent = unreadCount;

  const render = (arr,unread) => arr.map(t=>{
    const m = (t.messages&&t.messages[0])||{};
    const imp = (m.labelIds||[]).includes('IMPORTANT');
    const sender = (m.sender||'').replace(/<.*>/,'').replace(/"/g,'').trim() || m.sender || '';
    return '<div class="item '+(unread?'mail-unread':'')+'"><div class="it-main"><div class="it-title">'+(imp?'<span class="imp">★중요</span>':'')+esc(m.subject||'(제목 없음)')+'</div><div class="it-sub">'+esc(sender)+' · '+esc((m.snippet||'').slice(0,60))+'</div></div></div>';
  }).join('');

  if(unreadCount){ box.innerHTML = render(threads,true); return unreadCount; }
  // 0 unread → show recent inbox as bonus
  let r = await mcp(T_MAIL,{query:'in:inbox newer_than:14d',pageSize:5});
  const recent = (r&&r.threads)||[];
  if(recent.length){
    box.innerHTML = '<div class="empty" style="padding:8px 0">안읽은 메일 없음 · 최근 받은 메일</div>'+render(recent.slice(0,5),false);
  }else{
    box.innerHTML = '<div class="empty">안읽은 메일이 없습니다</div>';
  }
  return 0;
}

/* ================= 최근 문서 ================= */
async function loadFiles(){
  const box=document.getElementById('file');
  const d = await mcp(T_FILES,{pageSize:8,excludeContentSnippets:true});
  if(!d){ box.innerHTML='<div class="err">문서를 불러오지 못했습니다</div>'; document.getElementById('cnt-file').textContent='!'; return; }
  const files=(d.files||[]);
  document.getElementById('cnt-file').textContent=files.length;
  if(!files.length){ box.innerHTML='<div class="empty">최근 문서가 없습니다</div>'; return; }
  const typeIcon = m => m&&m.includes('spreadsheet')?'📊': m&&m.includes('document')?'📝': m&&m.includes('presentation')?'📽️': m&&m.includes('pdf')?'📕': m&&m.includes('json')?'🗄️': m&&m.includes('html')?'🌐':'📄';
  box.innerHTML = files.map(f=>{
    const mt = f.modifiedTime? new Intl.DateTimeFormat('ko-KR',{timeZone:KST,month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(f.modifiedTime)) : '';
    const title = f.viewUrl? '<a class="doc" href="'+esc(f.viewUrl)+'" target="_blank" rel="noopener">'+esc(f.title)+'</a>' : esc(f.title);
    return '<div class="item"><div class="time" style="min-width:22px">'+typeIcon(f.mimeType)+'</div><div class="it-main"><div class="it-title" style="font-weight:600">'+title+'</div><div class="it-sub">수정 '+esc(mt)+'</div></div></div>';
  }).join('');
}

/* ================= 요약 칩 + 알림 ================= */
function renderChips(cal,urgentN,mailN){
  document.getElementById('chips').innerHTML =
    '<div class="chip today"><span class="n">'+cal.today+'</span><span class="l">오늘 일정</span></div>'+
    '<div class="chip urgent"><span class="n">'+urgentN+'</span><span class="l">임박 마감 (D-7)</span></div>'+
    '<div class="chip mail"><span class="n">'+mailN+'</span><span class="l">안읽은 메일</span></div>'+
    '<div class="chip week"><span class="n">'+cal.week+'</span><span class="l">이번 주 일정</span></div>';
}
function renderAlert(urgentItems){
  const z=document.getElementById('alertZone');
  if(!urgentItems.length){ z.innerHTML=''; return; }
  let rows = urgentItems.map(x=>'<div class="row"><span class="dday '+ddayClass(x.dd)+'">'+ddayLabel(x.dd)+'</span><b>'+esc(x.task)+'</b><span style="color:#868e96;font-size:11px">'+esc(x.where||'')+' · '+esc(x.doc||'')+'</span></div>').join('');
  z.innerHTML='<div class="alert"><h2>⚠️ 이번 주 안에 처리할 마감 ('+urgentItems.length+'건)</h2>'+rows+'</div>';
}

/* ================= 실행 ================= */
(async function(){
  const [cal, gm, mailN] = await Promise.all([loadCal(), loadGongmun(), loadMail()]);
  loadFiles();
  renderChips(cal, gm.urgent, mailN);
  renderAlert(gm.items);
})();
</script>
